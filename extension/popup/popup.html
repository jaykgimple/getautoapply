<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GetAutoApply</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #08090a;
      color: #e4e4e7;
    }
    .header {
      padding: 16px;
      background: linear-gradient(135deg, #5e6ad2, #4f46e5);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header svg { width: 24px; height: 24px; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .content { padding: 16px; }
    .section { margin-bottom: 16px; }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #71717a;
      margin-bottom: 8px;
    }
    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      color: #e4e4e7;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 6px;
    }
    .btn:hover { background: rgba(94,106,210,0.15); border-color: rgba(94,106,210,0.3); }
    .btn-primary {
      background: #5e6ad2;
      border-color: #5e6ad2;
      color: white;
      font-weight: 500;
    }
    .btn-primary:hover { opacity: 0.9; background: #5e6ad2; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .status {
      font-size: 12px;
      color: #71717a;
      padding: 8px;
      background: rgba(255,255,255,0.02);
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .status.connected { color: #22c55e; border-color: rgba(34,197,94,0.2); }
    .field-count {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .field-count:last-child { border-bottom: none; }
    .field-count .label { color: #a1a1aa; }
    .field-count .value { color: #5e6ad2; font-weight: 500; }
    .footer {
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      text-align: center;
    }
    .footer a {
      color: #71717a;
      font-size: 11px;
      text-decoration: none;
    }
    .footer a:hover { color: #5e6ad2; }
    #results { margin-top: 8px; }
    .result-msg {
      font-size: 12px;
      padding: 6px 8px;
      border-radius: 6px;
      margin-bottom: 4px;
    }
    .result-msg.success { background: rgba(34,197,94,0.1); color: #22c55e; }
    .result-msg.error { background: rgba(239,68,68,0.1); color: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
      <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>GetAutoApply</h1>
  </div>

  <div class="content">
    <!-- Auth Status -->
    <div class="section">
      <div class="section-title">Status</div>
      <div class="status" id="auth-status">Checking...</div>
    </div>

    <!-- Quick Actions -->
    <div class="section">
      <div class="section-title">Quick Actions</div>
      <button class="btn btn-primary" id="btn-autofill" disabled>
        ✦ Auto-Fill Application
      </button>
      <button class="btn" id="btn-detect" disabled>
        🔍 Detect Form Fields
      </button>
      <button class="btn" id="btn-save">
        💾 Save This Job
      </button>
      <button class="btn" id="btn-dashboard">
        🔗 Open Dashboard
      </button>
      <div id="results"></div>
    </div>

    <!-- Field Detection Results -->
    <div class="section" id="fields-section" style="display:none">
      <div class="section-title">Detected Fields</div>
      <div id="fields-list"></div>
    </div>
  </div>

  <div class="footer">
    <a href="https://getautoapply.vercel.app/dashboard" target="_blank">getautoapply.vercel.app</a>
  </div>

  <script src="popup/popup.js"></script>
</body>
</html>
